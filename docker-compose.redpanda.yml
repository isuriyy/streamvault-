# StreamVault — Redpanda + PySpark stack
# Isolated on its own network (redpanda_net) — won't touch existing Docker projects.
#
# Commands:
#   Start broker + console:
#     docker compose -f docker-compose.redpanda.yml up -d
#
#   Create topics (run once):
#     docker compose -f docker-compose.redpanda.yml run --rm producer create_topics.py
#
#   Run replay producer (in a separate terminal):
#     docker compose -f docker-compose.redpanda.yml run --rm producer producer.py --data-dir /data/raw --delay 0.05
#
#   Run bronze streaming job:
#     docker compose -f docker-compose.redpanda.yml run --rm spark spark-submit /app/bronze_stream.py
#
#   Stop everything:
#     docker compose -f docker-compose.redpanda.yml down
#
#   Stop + wipe data:
#     docker compose -f docker-compose.redpanda.yml down -v

networks:
  redpanda_net:
    driver: bridge

volumes:
  redpanda_data:

services:

  # ── Redpanda broker ──────────────────────────────────────────────────────────
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: olist_redpanda
    networks:
      - redpanda_net
    ports:
      - "9092:9092"
      - "9644:9644"
      - "19092:19092"
    volumes:
      - redpanda_data:/var/lib/redpanda/data
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
      - --pandaproxy-addr internal://0.0.0.0:8082,external://0.0.0.0:18082
      - --advertise-pandaproxy-addr internal://redpanda:8082,external://localhost:18082
      - --schema-registry-addr internal://0.0.0.0:8081,external://0.0.0.0:18081
      - --rpc-addr redpanda:33145
      - --advertise-rpc-addr redpanda:33145
      - --smp 1
      - --memory 512M
      - --default-log-level=warn
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q healthy"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Redpanda Console ─────────────────────────────────────────────────────────
  console:
    image: redpandadata/console:latest
    container_name: olist_redpanda_console
    networks:
      - redpanda_net
    ports:
      - "8081:8080"
    environment:
      CONFIG_FILEPATH: /etc/redpanda/console-config.yaml
    volumes:
      - ./console-config.yaml:/etc/redpanda/console-config.yaml:ro
    depends_on:
      redpanda:
        condition: service_healthy

  # ── Producer ─────────────────────────────────────────────────────────────────
  producer:
    build:
      context: ./kafka
      dockerfile: Dockerfile
    container_name: olist_producer
    networks:
      - redpanda_net
    volumes:
      - ./data/raw:/data/raw:ro
    profiles:
      - tools
    depends_on:
      redpanda:
        condition: service_healthy

  # ── PySpark (Spark 3.5 + Delta Lake 3.x) ─────────────────────────────────────
  # Not started by "up -d" — only runs when explicitly called via "run --rm"
  spark:
    build:
      context: ./spark
      dockerfile: Dockerfile
    container_name: olist_spark
    networks:
      - redpanda_net
    volumes:
      - ./spark/jobs:/app          # PySpark scripts
      - ./data/lakehouse:/lakehouse # Delta Lake tables land here
      - ./data/checkpoints:/checkpoints # Streaming checkpoints
    profiles:
      - tools
    depends_on:
      redpanda:
        condition: service_healthy
    environment:
      - KAFKA_BROKER=redpanda:9092
      - LAKEHOUSE_PATH=/lakehouse
      - CHECKPOINT_PATH=/checkpoints
